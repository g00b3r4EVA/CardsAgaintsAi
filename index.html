                <div className="min-h-screen bg-zinc-200 font-sans flex flex-col overflow-hidden text-zinc-900 relative">
                
                <header className="bg-white border-b border-zinc-300 shadow-sm p-3 sm:p-4 sticky top-0 z-20 flex flex-col gap-3 sm:gap-4">
                    <div className="flex items-center justify-between w-full">
                    <div className="font-black text-xl tracking-tighter uppercase shrink-0 flex items-center gap-4">
                        Cards vs AI
                        <div className="text-xs font-bold text-zinc-400 tracking-normal hidden md:block">
                        Round {roundNumber}
                        </div>
                    </div>

                    <div className="flex items-center gap-2">
                        <button 
                        onClick={() => isAdmin ? setIsAdmin(false) : setShowAdminAuth(true)}
                        className="p-1.5 hover:bg-zinc-100 rounded-full transition-colors"
                        title="Admin Panel"
                        >
                        {isAdmin ? <Unlock className="w-5 h-5 text-green-600" /> : <Lock className="w-5 h-5 text-zinc-400" />}
                        </button>
                        <button 
                        onClick={() => setGameState('game_over')}
                        className="p-1.5 hover:bg-red-100 text-red-500 rounded-full transition-colors group"
                        title="End Match"
                        >
                        <XCircle className="w-6 h-6 group-hover:scale-110 transition-transform" />
                        </button>
                    </div>
                    </div>
                    
                    <div className="flex flex-wrap justify-center sm:justify-start gap-2 sm:gap-3 w-full">
                    {players.map(p => (
                        <div key={p.id} className={`
                        flex items-center gap-1.5 sm:gap-2 px-2.5 sm:px-3 py-1.5 rounded-full text-xs sm:text-sm font-bold border-2 transition-all
                        ${p.isCzar ? 'shadow-[0_0_15px_rgba(251,191,36,0.5)] border-amber-400' : p.theme.border}
                        ${p.theme.bg} ${p.theme.text}
                        ${p.id === 'human' ? 'ring-2 ring-offset-1 ring-zinc-900' : ''}
                        `}>
                        {p.isCzar ? <Crown className="w-3.5 h-3.5 sm:w-4 sm:h-4 text-amber-500" /> : 
                        p.type === 'human' ? <User className="w-3.5 h-3.5 sm:w-4 sm:h-4" /> : <Bot className="w-3.5 h-3.5 sm:w-4 sm:h-4" />}
                        <span className="hidden sm:inline">{p.name.replace('AI ', '')}</span>
                        <span className="bg-white/60 px-1.5 rounded-md ml-0.5 sm:ml-1">{p.score}</span>
                        </div>
                    ))}
                    </div>
                </header>

                <main className={`flex-1 flex flex-col lg:flex-row items-center justify-start lg:justify-center p-4 sm:p-6 gap-6 sm:gap-8 lg:gap-12 overflow-y-auto pb-48`}>
                    
                    {gameState === 'czar_picking' && (
                    <div className="w-full flex flex-col items-center gap-6 mt-4 lg:mt-0">
                        <h2 className="text-xl sm:text-3xl font-black text-zinc-800 text-center animate-pulse">{getStatusMessage()}</h2>
                        
                        {deviceOwnerPlayer?.isCzar ? (
                        <div className="flex flex-row overflow-x-auto pb-4 gap-4 w-full justify-start md:justify-center px-4 snap-x hide-scrollbar">
                            {blackCardOptions.map((card, idx) => (
                            <div key={idx} className="snap-center shrink-0">
                                <Card text={card.text} isBlack hover onClick={() => handleBlackCardChoice(card)} />
                            </div>
                            ))}
                        </div>
                        ) : (
                        <div className="flex flex-wrap justify-center gap-4 opacity-50 pointer-events-none">
                            {[1, 2, 3].map(i => (
                            <Card key={i} text="?" isBlack className="animate-pulse" />
                            ))}
                        </div>
                        )}
                    </div>
                    )}

                    {gameState !== 'czar_picking' && (
                    <>
                        <div className="flex flex-col items-center space-y-4 sm:space-y-6 w-full lg:w-1/3 max-w-sm shrink-0 mt-2 lg:mt-0">
                        {currentBlackCard && <Card text={currentBlackCard.text} isBlack />}
                        
                        <div className="text-center space-y-3 w-full">
                            <h2 className="text-lg sm:text-2xl font-black text-zinc-800 min-h-[40px] flex items-center justify-center">
                            {getStatusMessage()}
                            {gameState === 'judging' && czar?.type === 'bot' && <Loader2 className="w-5 h-5 ml-2 animate-spin text-zinc-500" />}
                            </h2>
                            
                            {gameState === 'playing' && (
                            <div className="flex flex-wrap justify-center gap-2 mt-4 max-w-xs mx-auto">
                                {players.filter(p => !p.isCzar).map(p => (
                                <div key={p.id} className={`
                                    flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold transition-all border
                                    ${p.hasPlayed ? `${p.theme.bg} ${p.theme.text} ${p.theme.border} scale-100 shadow-sm` : 'bg-zinc-200/50 text-zinc-400 border-transparent scale-95'}
                                `}>
                                    {p.hasPlayed && <CheckCircle2 className="w-3 h-3" />}
                                    {p.name.replace('AI ', '')} {p.hasPlayed ? 'played' : 'thinking...'}
                                </div>
                                ))}
                            </div>
                            )}
                            
                            {gameState === 'round_end' && (
                            <div className="mt-4 flex flex-col items-center justify-center gap-3">
                                <div className="text-zinc-500 font-bold animate-pulse flex items-center gap-2">
                                Loading next round... <Loader2 className="w-4 h-4 animate-spin" />
                                </div>
                                <button 
                                onClick={handleNextRound}
                                className="bg-zinc-900 text-white px-6 py-2 rounded-full font-bold text-sm hover:bg-zinc-800 transition-colors shadow-lg flex items-center gap-2"
                                >
                                Next Round <ArrowRight className="w-4 h-4" />
                                </button>
                            </div>
                            )}
                        </div>
                        </div>

                        {(gameState === 'judging' || gameState === 'round_end') && (
                        <div className="w-full lg:w-2/3 max-w-4xl flex justify-center pb-8 lg:pb-0">
                            <div className="flex flex-row flex-wrap justify-center gap-4 sm:gap-6 p-4 sm:p-8 rounded-3xl bg-zinc-300/30 w-full items-center min-h-[300px]">
                            {playedCards.map((play, idx) => {
                                const isWinner = gameState === 'round_end' && roundWinner === play.playerId;
                                const canJudge = gameState === 'judging' && deviceOwnerPlayer?.isCzar;
                                const playerTheme = players.find(p => p.id === play.playerId)?.theme;
                                const playerName = players.find(p => p.id === play.playerId)?.name;
                                
                                const czarEval = czar ? evaluateCardMatch(play.card, currentBlackCard, nsfwLevel, czar) : 0;
                                
                                return (
                                <div key={idx} className="relative mt-4 sm:mt-6">
                                    {(gameState === 'round_end' || (gameState === 'judging' && deviceOwnerPlayer?.isCzar)) && (
                                    <div className={`absolute -top-5 sm:-top-8 left-1/2 -translate-x-1/2 whitespace-nowrap px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-xs sm:text-sm font-bold shadow-md z-20 transition-all
                                        ${isWinner ? `${playerTheme?.bg} ${playerTheme?.text} ring-2 ${playerTheme?.border} scale-110` : 
                                        (gameState === 'judging' ? `${playerTheme?.bg} ${playerTheme?.text} border ${playerTheme?.border}` : 'bg-zinc-800 text-white')}
                                    `}>
                                        {playerName} {isWinner ? 'WINS!' : ''}
                                    </div>
                                    )}
                                    
                                    <Card 
                                    text={play.card.text} 
                                    hover={canJudge}
                                    onClick={() => canJudge ? handleJudgeCard(play) : null}
                                    adminScore={isAdmin ? czarEval : undefined}
                                    className={`
                                        ${isWinner ? `ring-4 ${playerTheme?.border} scale-105 shadow-2xl z-10` : ''}
                                        ${(gameState === 'judging' && deviceOwnerPlayer?.isCzar) ? `ring-2 ${playerTheme?.border}` : ''}
                                        ${gameState === 'round_end' && !isWinner ? 'opacity-40 scale-95 grayscale' : ''}
                                        ${canJudge ? 'hover:ring-4 hover:ring-blue-400' : ''}
                                    `}
                                    />
                                </div>
                                );
                            })}
                            </div>
                        </div>
                        )}
                    </>
                    )}
                </main>

                {gameState === 'playing' && !deviceOwnerPlayer?.isCzar && (
                    <div className={`
                    fixed bottom-0 left-0 w-full z-30 transition-transform duration-500 ease-in-out
                    ${(showHand && !transitioningTo) ? 'translate-y-0' : 'translate-y-[calc(100%-48px)] sm:translate-y-[calc(100%-64px)]'}
                    `}>
                    <div className="bg-zinc-800 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.3)] border-t border-zinc-700">
                        <div 
                        onClick={() => setShowHand(!showHand)}
                        className="h-12 sm:h-16 flex items-center justify-center cursor-pointer hover:bg-zinc-700/50 transition-colors rounded-t-3xl border-b border-zinc-700/50"
                        >
                        <div className="flex flex-col items-center gap-1">
                            <div className="w-12 h-1.5 bg-zinc-600 rounded-full"></div>
                            <h3 className="text-zinc-300 font-bold uppercase tracking-widest text-xs sm:text-sm flex items-center gap-2">
                            {deviceOwnerPlayer?.hasPlayed ? (
                                <span className="text-emerald-400 flex items-center gap-1"><CheckCircle2 className="w-4 h-4"/> Card Played</span>
                            ) : (
                                <span>{deviceOwnerPlayer?.name}'s Hand ({deviceOwnerPlayer?.hand.length})</span>
                            )}
                            </h3>
                        </div>
                        </div>
                        
                        <div className="p-4 sm:p-6 pb-8 max-w-7xl mx-auto h-[280px] sm:h-[320px]">
                        <div className="flex overflow-x-auto h-full gap-3 sm:gap-4 px-2 snap-x hide-scrollbar items-center">
                            {deviceOwnerPlayer?.hand.map((cardObj, idx) => (
                            <div key={idx} className={`snap-start shrink-0 transition-all duration-300 ${deviceOwnerPlayer.hasPlayed ? 'opacity-50 grayscale pointer-events-none scale-95' : ''}`}>
                                <Card 
                                text={cardObj.text} 
                                hover={!deviceOwnerPlayer?.hasPlayed}
                                onClick={() => {
                                    if (gameState === 'playing' && !deviceOwnerPlayer?.isCzar && !deviceOwnerPlayer?.hasPlayed) {
                                    playCard(deviceOwnerPlayer.id, cardObj);
                                    }
                                }}
                                adminScore={(isAdmin && czar && currentBlackCard) ? evaluateCardMatch(cardObj, currentBlackCard, nsfwLevel, czar) : undefined}
                                />
                            </div>
                            ))}
                        </div>
                        </div>
                    </div>
                    </div>
                )}

                {transitioningTo && (
                    <div className="fixed inset-0 z-[200] bg-[#0a0a0a] flex flex-col items-center justify-center text-white p-6">
                        <Users className="w-20 h-20 mb-8 text-blue-500 animate-bounce" />
                        <h2 className="text-3xl md:text-5xl font-black mb-4 text-center">Pass the device to</h2>
                        <h1 className="text-5xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500 mb-12 text-center">
                            {players.find(p => p.id === transitioningTo)?.name}
                        </h1>
                        <p className="text-zinc-400 mb-12 text-lg text-center max-w-md">No peeking! Make sure you are the correct player before continuing.</p>
                        <button
                            onClick={() => {
                                setDeviceOwnerId(transitioningTo);
                                setTransitioningTo(null);
                            }}
                            className="px-10 py-5 bg-white text-black font-black rounded-full text-xl hover:scale-105 hover:shadow-[0_0_40px_rgba(255,255,255,0.4)] transition-all"
                        >
                            I am {players.find(p => p.id === transitioningTo)?.name}
                        </button>
                    </div>
                )}

                {showAdminAuth && (
                    <div className="fixed inset-0 bg-black/60 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white p-6 sm:p-8 rounded-3xl shadow-2xl w-full max-w-sm transform scale-100 transition-transform">
                        <div className="flex items-center gap-3 mb-6">
                        <div className="p-3 bg-red-100 text-red-600 rounded-xl">
                            <Lock className="w-6 h-6"/>
                        </div>
                        <h3 className="text-xl font-black uppercase">Admin Access</h3>
                        </div>
                        <p className="text-sm text-zinc-500 font-medium mb-4">Enter the developer PIN to view internal AI evaluation metrics.</p>
                        <input
                        type="password"
                        autoFocus
                        value={adminPin}
                        onChange={e => setAdminPin(e.target.value)}
                        className="w-full border-2 border-zinc-200 rounded-xl px-4 py-4 font-mono text-center text-3xl tracking-[0.5em] mb-6 focus:border-red-500 outline-none transition-colors"
                        placeholder="••••"
                        maxLength={4}
                        onKeyDown={e => {
                            if (e.key === 'Enter') {
                            if (adminPin === '1170') {
                                setIsAdmin(true);
                                setShowAdminAuth(false);
                                setAdminPin("");
                            } else {
                                setAdminPin("");
                            }
                            }
                        }}
                        />
                        <div className="flex justify-end gap-3">
                        <button 
                            onClick={() => { setShowAdminAuth(false); setAdminPin(""); }} 
                            className="px-5 py-3 font-bold text-zinc-500 hover:bg-zinc-100 rounded-xl transition-colors"
                        >
                            Cancel
                        </button>
                        <button 
                            onClick={() => {
                            if (adminPin === '1170') {
                                setIsAdmin(true);
                                setShowAdminAuth(false);
                                setAdminPin("");
                            } else {
                                setAdminPin("");
                            }
                            }} 
                            className="px-5 py-3 font-bold bg-zinc-900 text-white rounded-xl hover:bg-zinc-800 transition-colors shadow-lg"
                        >
                            Unlock
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                {isAdmin && (
                    <div className={`fixed bottom-4 right-4 sm:top-20 sm:right-6 sm:bottom-auto w-[calc(100%-2rem)] sm:w-80 bg-zinc-950/95 backdrop-blur-md text-green-400 p-5 rounded-2xl shadow-2xl z-50 text-xs font-mono border border-green-900/50 shadow-[0_0_30px_rgba(0,0,0,0.5)] transition-all duration-300 pointer-events-auto ${isAdminMinimized ? 'max-h-[64px] overflow-hidden' : 'max-h-[50vh] overflow-y-auto'}`}>
                    <div className={`flex items-center justify-between border-green-900/50 ${isAdminMinimized ? '' : 'mb-4 border-b pb-2'}`}>
                        <h3 className="font-black text-white flex items-center gap-2 text-sm">
                        <ShieldAlert className="w-4 h-4 text-red-500"/> AI DEBUG LOGS
                        </h3>
                        <div className="flex items-center gap-3">
                        <div className="h-2 w-2 bg-green-500 rounded-full animate-pulse"></div>
                        <button 
                            onClick={() => setIsAdminMinimized(!isAdminMinimized)}
                            className="text-zinc-400 hover:text-white p-1 rounded-md hover:bg-zinc-800 transition-colors"
                            title={isAdminMinimized ? "Expand" : "Minimize"}
                        >
                            {isAdminMinimized ? <ChevronDown className="w-4 h-4" /> : <ChevronUp className="w-4 h-4" />}
                        </button>
                        </div>
                    </div>
                    
                    {!isAdminMinimized && (
                        <>
                        <div className="space-y-2 opacity-90">
                            <div className="flex justify-between"><span>[SYSTEM] Phase:</span> <span className="text-white uppercase">{gameState}</span></div>
                            <div className="flex justify-between"><span>[SYSTEM] NSFW Tier:</span> <span className="text-white">{nsfwLevel}/100</span></div>
                            <div className="flex justify-between"><span>[CZAR] Current:</span> <span className="text-white">{czar?.name || 'N/A'}</span></div>
                            <div className="flex justify-between items-start">
                            <span>[CZAR] Prefs:</span> 
                            <span className="text-white text-right max-w-[120px]">{czar?.prefs?.join(', ') || 'None'}</span>
                            </div>
                            <div className="flex justify-between items-start">
                            <span>[CZAR] Hates:</span> 
                            <span className="text-red-400 text-right max-w-[120px]">{czar?.hates?.join(', ') || 'None'}</span>
                            </div>
                        </div>
                        
                        <hr className="my-3 border-green-900/50" />
                        
                        {gameState === 'playing' && (
                            <div className="space-y-1">
                            <div className="font-bold text-white mb-2">» AWAITING BOT ACTIONS...</div>
                            {players.filter(p => !p.isCzar).map(p => (
                                <div key={p.id} className="flex justify-between opacity-80">
                                <span className="truncate">{p.name}:</span>
                                <span className={p.hasPlayed ? 'text-green-300' : 'text-zinc-500'}>
                                    {p.hasPlayed ? 'LOCKED IN' : 'CALCULATING'}
                                </span>
                                </div>
                            ))}
                            <div className="mt-2 text-yellow-500 animate-pulse text-[10px]">Your hand scores are now visible on your cards.</div>
                            </div>
                        )}

                        {(gameState === 'judging' || gameState === 'round_end') && czar && (
                            <div className="space-y-2">
                            <div className="font-bold text-white mb-2">» CZAR EVALUATION SCORES:</div>
                            {playedCards.map(p => {
                                const player = players.find(pl => pl.id === p.playerId);
                                const score = evaluateCardMatch(p.card, currentBlackCard, nsfwLevel, czar);
                                return (
                                <div key={p.playerId} className="flex flex-col mb-2 bg-green-950/30 p-2 rounded border border-green-900/30">
                                    <div className="flex justify-between mb-1">
                                    <span className="text-white font-bold">{player?.name}</span>
                                    <span className="text-yellow-400">{score.toFixed(1)} pts</span>
                                    </div>
                                    <div className="text-[10px] opacity-70 truncate">
                                    Tags: {p.card.tags.join(', ')}
                                    </div>
                                </div>
                                );
                            })}
                            {czar.type === 'bot' && gameState === 'judging' && (
                                <div className="mt-2 text-yellow-500 animate-pulse">Bots pick the highest score. A chaos factor (+0-10) is added internally during decision.</div>
                            )}
                            </div>
                        )}
                        </>
                    )}
                    </div>
                )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
