      { name: 'Jason', colorId: 'rose', bg: 'bg-rose-200', text: 'text-rose-950', border: 'border-rose-400', prefs: ['scary', 'action'] },
      { name: 'Ricky', colorId: 'blue', bg: 'bg-blue-600', text: 'text-white', border: 'border-blue-300', prefs: ['bad', 'school'] },
      { name: 'Roxanne', colorId: 'pink', bg: 'bg-pink-500', text: 'text-pink-50', border: 'border-pink-800', prefs: ['body', 'sex'] },
      { name: 'Quinn', colorId: 'lime', bg: 'bg-lime-400', text: 'text-lime-950', border: 'border-lime-700', prefs: ['absurd', 'secret'] },
      { name: 'Chuck', colorId: 'stone', bg: 'bg-stone-600', text: 'text-stone-50', border: 'border-stone-400', prefs: ['gross', 'sad'] },
      { name: 'Carol', colorId: 'cyan', bg: 'bg-cyan-200', text: 'text-cyan-900', border: 'border-cyan-500', prefs: ['family', 'food'] },
      { name: 'Dewey', colorId: 'indigo', bg: 'bg-indigo-200', text: 'text-indigo-950', border: 'border-indigo-400', prefs: ['school', 'friendly'] }
    ];

    const HUMAN_THEME = { id: 'zinc', bg: 'bg-zinc-100', text: 'text-zinc-800', border: 'border-zinc-400' };

    // --- HELPER FUNCTIONS ---
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

    // --- THE NEW AND IMPROVED AI HUMOR ENGINE 3.1 ---
    const evaluateCardMatch = (whiteCard, blackCard, nsfwLevel, botPrefs = []) => {
      let baseScore = 20; // Starting baseline score
      let multiplier = 1.0;
      
      const wTags = whiteCard.tags || [];
      const bTags = blackCard.tags || [];

      // 1. VIBE CHECK (Based on global game setting)
      if (nsfwLevel >= 70 && (wTags.includes('nsfw') || wTags.includes('dark') || wTags.includes('sex'))) {
        baseScore += 10;
      } else if (nsfwLevel <= 30 && (wTags.includes('nsfw') || wTags.includes('dark') || wTags.includes('sex'))) {
        baseScore -= 10; 
      }

      // 2. COMEDIC TROPES (The "Sense of Humor")
      if ((bTags.includes('family') || bTags.includes('school')) && (wTags.includes('dark') || wTags.includes('nsfw'))) baseScore += 8;
      if ((bTags.includes('sad') || bTags.includes('scary') || bTags.includes('politics')) && (wTags.includes('absurd') || wTags.includes('animals'))) baseScore += 8;
      if ((bTags.includes('gross') || bTags.includes('body')) && wTags.includes('food')) baseScore += 8;

      // 3. PERSONALITY CHECK (50% increase if it matches bot preferences)
      const matchesPref = wTags.some(tag => botPrefs.includes(tag));
      if (matchesPref) {
        multiplier *= 1.50;
      }

      // 4. DIRECT TAG MATCH ("Makes sense" vs "Doesn't make sense")
      const makesSense = wTags.some(tag => bTags.includes(tag));
      if (makesSense) {
        multiplier *= 1.25; // 25% Bonus for logical fit
      } else {
        multiplier *= 0.75; // 25% Deduction for random/nonsensical fit
      }

      return baseScore * multiplier;
    };


    // --- MAIN COMPONENT ---
    function App() {
      const [gameState, setGameState] = useState('menu'); // 'menu', 'roster', 'library', 'setup', 'czar_picking', 'playing', 'judging', 'round_end', 'game_over'
      
      // Settings & DB
      const [aiCount, setAiCount] = useState(5);
      const [nsfwLevel, setNsfwLevel] = useState(50); 
      const [cardsPerHand, setCardsPerHand] = useState(10);
      const [allBlackCards, setAllBlackCards] = useState(INITIAL_BLACK_CARDS);
      const [allWhiteCards, setAllWhiteCards] = useState(INITIAL_WHITE_CARDS);
      const [setupError, setSetupError] = useState("");

      // Game Data
      const [blackDeck, setBlackDeck] = useState([]);
      const [whiteDeck, setWhiteDeck] = useState([]);
      const [players, setPlayers] = useState([]);
      const [czarIndex, setCzarIndex] = useState(0);
      const [blackCardOptions, setBlackCardOptions] = useState([]);
      const [currentBlackCard, setCurrentBlackCard] = useState(null);
      const [playedCards, setPlayedCards] = useState([]);
      const [roundWinner, setRoundWinner] = useState(null);
      const [roundNumber, setRoundNumber] = useState(0);
      const pointsToWin = 5;

      // Admin State
      const [isAdmin, setIsAdmin] = useState(false);
      const [showAdminAuth, setShowAdminAuth] = useState(false);
      const [adminPin, setAdminPin] = useState("");

      // UI State
      const [showHand, setShowHand] = useState(false);
      const playedCardsRef = useRef([]);

      // Library State
      const [libTab, setLibTab] = useState('black'); 
      const [filterTier, setFilterTier] = useState('all');
      const [newCardText, setNewCardText] = useState("");
      const [newCardTier, setNewCardTier] = useState("friendly");

      // --- GAME SETUP & LOGIC ---
      const initGame = () => {
        setSetupError("");
        
        let allowedTiers = ['friendly'];
        if (nsfwLevel > 30) allowedTiers.push('meh');
        if (nsfwLevel > 70) allowedTiers.push('nsfw');

        const validBlack = allBlackCards.filter(c => allowedTiers.includes(c.tier));
        const validWhite = allWhiteCards.filter(c => allowedTiers.includes(c.tier));

        if (validBlack.length === 0 || validWhite.length === 0) {
          setSetupError("You need at least 1 Black Card and 1 White Card in this vibe category to play! Add more in the Library or adjust the slider.");
          return;
        }

        let bDeckPool = [];
        while (bDeckPool.length < 100) {
          const clonedBatch = shuffle(validBlack).map(c => ({...c, id: `${c.id}_${generateId()}`}));
          bDeckPool = [...bDeckPool, ...clonedBatch];
        }
        let bDeck = bDeckPool.slice(0, 100);

        let wDeckPool = [];
        while (wDeckPool.length < 300) {
          const clonedBatch = shuffle(validWhite).map(c => ({...c, id: `${c.id}_${generateId()}`}));
          wDeckPool = [...wDeckPool, ...clonedBatch];
        }
        let wDeck = wDeckPool.slice(0, 300);

        // Shuffle and pick AIs from our master roster
        const shuffledBots = shuffle([...AI_ROSTER]);
        const selectedBots = shuffledBots.slice(0, aiCount);

        const initialPlayers = [
          { id: 'human', name: 'You', type: 'human', theme: HUMAN_THEME, prefs: [], hand: [], score: 0, isCzar: false, hasPlayed: false }
        ];

        for (let i = 0; i < aiCount; i++) {
          const botDef = selectedBots[i];
          initialPlayers.push({ 
            id: `ai${i+1}`, 
            name: `AI ${botDef.name}`, 
            type: 'bot', 
            theme: botDef, // Provides bg, text, border
            prefs: botDef.prefs,
            hand: [], score: 0, isCzar: false, hasPlayed: false 
          });
        }

        const startingCzarIdx = Math.floor(Math.random() * initialPlayers.length);
        startRound(initialPlayers, bDeck, startingCzarIdx, wDeck, 1);
      };

      const startRound = (currentPlayers, bDeck, cIndex, wDeck, rNumber) => {
        let currentWhiteIdx = 0;
        
        const newPlayers = currentPlayers.map((p, idx) => {
          const cardsNeeded = Math.max(0, cardsPerHand - p.hand.length);
          const newCards = wDeck.slice(currentWhiteIdx, currentWhiteIdx + cardsNeeded);
          currentWhiteIdx += cardsNeeded;
          return {
            ...p,
            hand: [...p.hand, ...newCards],
            isCzar: idx === cIndex,
            hasPlayed: false
          };
        });

        const cardsToDraw = Math.min(3, bDeck.length);
        const drawnBlackCards = bDeck.slice(0, cardsToDraw);
        
        setWhiteDeck(wDeck.slice(currentWhiteIdx));
        setBlackDeck(bDeck.slice(cardsToDraw));
        setPlayers(newPlayers);
        setBlackCardOptions(drawnBlackCards);
        setCurrentBlackCard(null);
        setCzarIndex(cIndex);
        setRoundNumber(rNumber);
        setPlayedCards([]);
        playedCardsRef.current = [];
        setRoundWinner(null);
        setGameState('czar_picking');
        setShowHand(false); 
      };

      const handleBlackCardChoice = (selectedCard) => {
        const unselectedCards = blackCardOptions.filter(c => c.id !== selectedCard.id);
        setBlackDeck(prev => [...prev, ...unselectedCards]); 
        setCurrentBlackCard(selectedCard);
        setGameState('playing');
      };

      const handleNextRound = () => {
        if (players.some(p => p.score >= pointsToWin)) {
          setGameState('game_over');
          return;
        }
        const nextCzarIdx = (czarIndex + 1) % players.length;
        startRound(players, blackDeck, nextCzarIdx, whiteDeck, roundNumber + 1);
      };

      const playCard = (playerId, cardObj) => {
        setPlayers(prevPlayers => {
          const player = prevPlayers.find(p => p.id === playerId);
          if (!player || player.hasPlayed) return prevPlayers;

          const newPlayers = prevPlayers.map(p =>
            p.id === playerId ? { ...p, hasPlayed: true, hand: p.hand.filter(c => c.id !== cardObj.id) } : p
          );

          setPlayedCards(prevPlayed => {
            const newPlayed = [...prevPlayed, { playerId, card: cardObj }];
            playedCardsRef.current = newPlayed; 
            
            if (newPlayed.length === prevPlayers.length - 1) {
              setTimeout(() => {
                setPlayedCards(shuffle([...newPlayed])); 
                setGameState('judging');
                setShowHand(false); 
              }, 1500); 
            }
            return newPlayed;
          });
          
          if (playerId === 'human') setShowHand(false);
          return newPlayers;
        });
      };

      const handleJudgeCard = (winningPlay) => {
        setRoundWinner(winningPlay.playerId);
        setPlayers(prev => prev.map(p =>
          p.id === winningPlay.playerId ? { ...p, score: p.score + 1 } : p
        ));
        setGameState('round_end');
      };

      // --- AUTOMATIC ROUND ADVANCEMENT ---
      useEffect(() => {
        if (gameState === 'round_end') {
          const timer = setTimeout(() => {
            handleNextRound();
          }, 5000);
          return () => clearTimeout(timer);
        }
      }, [gameState]);

      // --- AI LOGIC: CZAR PICKING BLACK CARD ---
      useEffect(() => {
        if (gameState === 'czar_picking') {
          const czar = players.find(p => p.isCzar);
          if (czar && czar.type === 'bot' && blackCardOptions.length > 0) {
            const timeout = setTimeout(() => {
              const randomIdx = Math.floor(Math.random() * blackCardOptions.length);
              handleBlackCardChoice(blackCardOptions[randomIdx]);
            }, 2000 + Math.random() * 1000);
            return () => clearTimeout(timeout);
          }
        }
      }, [gameState, blackCardOptions]);

      // --- AI LOGIC: PLAYING WHITE CARDS ---
      useEffect(() => {
        if (gameState === 'playing') {
          const timeouts = [];
          players.forEach(p => {
            if (p.type === 'bot' && !p.isCzar && !p.hasPlayed) {
              const delay = 1500 + Math.random() * 3000; 
              const timeout = setTimeout(() => {
                setPlayers(currentPlayers => {
                  const bot = currentPlayers.find(b => b.id === p.id);
                  if (bot && !bot.hasPlayed && currentBlackCard) {
                    let bestCard = bot.hand[0];
                    let bestScore = -999;
                    
                    bot.hand.forEach(card => {
                      let score = evaluateCardMatch(card, currentBlackCard, nsfwLevel, bot.prefs);
                      score += (Math.random() * 10); // Add chaos factor precisely during decision logic!
                      if (score > bestScore) {
                        bestScore = score;
                        bestCard = card;
                      }
                    });
                    
                    playCard(bot.id, bestCard);
                  }
                  return currentPlayers; 
                });
              }, delay);
              timeouts.push(timeout);
            }
          });
          return () => timeouts.forEach(clearTimeout);
        }
      }, [gameState, roundNumber, currentBlackCard, nsfwLevel]); 

      // --- AI LOGIC: JUDGING ---
      useEffect(() => {
        if (gameState === 'judging') {
          const czar = players.find(p => p.isCzar);
          if (czar && czar.type === 'bot') {
            const delay = 3500 + Math.random() * 3000; 
            const timeout = setTimeout(() => {
              const currentPlayed = playedCardsRef.current;
              if (currentPlayed.length > 0 && currentBlackCard) {
                let bestPlay = currentPlayed[0];
                let bestScore = -999;
                currentPlayed.forEach(play => {
                  let score = evaluateCardMatch(play.card, currentBlackCard, nsfwLevel, czar.prefs);
                  score += (Math.random() * 10); // Add chaos factor precisely during decision logic!
                  if (score > bestScore) {
                    bestScore = score;
                    bestPlay = play;
                  }
                });
                handleJudgeCard(bestPlay);
              }
            }, delay);
            return () => clearTimeout(timeout);
          }
        }
      }, [gameState, currentBlackCard, nsfwLevel]);

      // --- RENDER HELPERS ---
      const human = players.find(p => p.id === 'human');
      const czar = players.find(p => p.isCzar);
      
      const getStatusMessage = () => {
        if (gameState === 'czar_picking') {
          if (human?.isCzar) return "Choose the Black Card!";
          return `${czar?.name} is picking a Black Card...`;
        }
        if (gameState === 'playing') {
          if (human?.isCzar) return "You are the Card Czar! Waiting for players...";
          if (!human?.hasPlayed) return "Choose a card to play.";
          return "Waiting for others to play...";
        }
        if (gameState === 'judging') {
          if (human?.isCzar) return "You are the Card Czar! Pick the winning card.";
          return `${czar?.name} is judging...`;
        }
        if (gameState === 'round_end') {
          const winnerName = players.find(p => p.id === roundWinner)?.name;
          return `${winnerName} wins the round!`;
        }
        return "";
      };

      const Card = ({ text, isBlack, onClick, className = "", hover = false, adminScore }) => (
        <div 
          onClick={onClick}
          className={`
            relative flex flex-col justify-between p-4 sm:p-5 rounded-xl shadow-lg 
            w-36 sm:w-48 h-48 sm:h-64 flex-shrink-0 cursor-pointer 
            transition-all duration-300 ease-out border-2
            ${isBlack ? 'bg-zinc-950 text-white border-zinc-700' : 'bg-white text-zinc-900 border-zinc-200'}
            ${hover ? 'hover:-translate-y-4 hover:shadow-xl hover:border-zinc-400' : ''}
            ${className}
          `}
        >
          {adminScore !== undefined && (
            <div className="absolute -top-3 -right-3 bg-red-500 text-white text-xs font-black px-2 py-1 rounded-lg z-20 shadow-lg border-2 border-white transform rotate-6">
              Score: {adminScore.toFixed(0)}
            </div>
          )}
          <div className="font-bold text-base sm:text-xl leading-tight overflow-hidden">
            {text}
          </div>
          <div className="flex items-center gap-1.5 sm:gap-2 mt-4 opacity-50 text-[10px] sm:text-sm font-bold uppercase tracking-wider shrink-0">
            <div className="w-2 h-2 sm:w-3 sm:h-3 rounded-full border-2 border-current"></div>
            Cards vs AI
          </div>
        </div>
      );

      // --- VIEWS ---
      if (gameState === 'menu') {
        return (
          <div className="min-h-screen bg-[#0a0a0a] flex flex-col items-center justify-center p-6 text-white font-sans relative overflow-hidden selection:bg-blue-500/30">
            
            {/* Atmospheric Glows */}
            <div className="absolute top-0 left-1/4 w-96 h-96 bg-blue-900/20 rounded-full blur-[120px] -z-10 pointer-events-none"></div>
            <div className="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-900/20 rounded-full blur-[120px] -z-10 pointer-events-none"></div>

            {/* Subtle Background Cards */}
            <div className="absolute -top-12 -left-12 md:top-10 md:left-10 w-48 md:w-72 h-72 md:h-96 bg-zinc-900/40 border border-zinc-800/50 rounded-3xl rotate-12 shadow-2xl -z-10 backdrop-blur-sm transition-transform duration-700 hover:rotate-6 hover:scale-105"></div>
            <div className="absolute -bottom-12 -right-12 md:bottom-10 md:right-10 w-48 md:w-72 h-72 md:h-96 bg-zinc-900/40 border border-zinc-800/50 rounded-3xl -rotate-12 shadow-2xl -z-10 backdrop-blur-sm transition-transform duration-700 hover:-rotate-6 hover:scale-105"></div>
            
            <div className="flex flex-col items-center z-10 space-y-12 max-w-3xl w-full mt-[-5vh]">
              
              {/* The Staggered Title Cards */}
              <div className="flex flex-col items-center gap-4 md:gap-6 select-none group cursor-default">
                <div className="bg-white text-black font-black text-6xl md:text-[6rem] leading-none px-10 py-6 rounded-2xl -rotate-[4deg] -ml-8 shadow-[0_20px_50px_rgba(255,255,255,0.1)] tracking-tight transition-transform duration-500 group-hover:-translate-y-2 group-hover:-rotate-[6deg]">
                  CARDS
                </div>
                <div className="bg-white text-black font-black text-6xl md:text-[6rem] leading-none px-10 py-6 rounded-2xl rotate-[2deg] ml-16 shadow-[0_20px_50px_rgba(255,255,255,0.1)] tracking-tight z-10 transition-transform duration-500 group-hover:-translate-y-1 group-hover:rotate-[4deg]">
                  AGAINST
                </div>
                <div className="bg-zinc-950 border-2 border-zinc-800 text-white font-black text-6xl md:text-[6rem] leading-none px-10 py-6 rounded-2xl flex items-center gap-4 shadow-[0_0_40px_rgba(59,130,246,0.2)] mt-2 -rotate-[1deg] transition-transform duration-500 group-hover:scale-105 group-hover:-rotate-[2deg]">
                  AI <Bot className="w-16 h-16 md:w-24 md:h-24 text-blue-500 drop-shadow-[0_0_20px_rgba(59,130,246,0.6)] animate-pulse" />
                </div>
              </div>

              <p className="text-zinc-400 text-lg md:text-xl text-center max-w-lg font-medium px-4 leading-relaxed">
                A terrible party game for you and your completely soulless robotic friends.
              </p>

              <div className="flex flex-col gap-4 w-full max-w-[300px] sm:max-w-sm mx-auto">
                <button 
                  onClick={() => setGameState('setup')}
                  className="group relative flex items-center justify-center gap-3 bg-white text-black px-8 py-4 md:py-5 rounded-full font-black text-lg md:text-xl hover:scale-105 hover:bg-zinc-100 transition-all duration-300 shadow-[0_0_30px_rgba(255,255,255,0.2)] hover:shadow-[0_0_60px_rgba(255,255,255,0.4)]"
                >
                  <Sparkles className="w-6 h-6 md:w-7 md:h-7 text-zinc-600 group-hover:text-black transition-colors" />
                  <span>Enter the Madness</span> 
                  <ArrowRight className="w-6 h-6 md:w-7 md:h-7 group-hover:translate-x-1 transition-transform" />
                </button>
                
                <div className="flex gap-3 w-full mt-2">
                  <button 
                    onClick={() => setGameState('library')}
                    className="group flex-1 flex items-center justify-center gap-2 bg-zinc-900/80 backdrop-blur-md text-zinc-300 px-5 py-3.5 rounded-full font-bold text-sm hover:bg-zinc-800 hover:text-white transition-all duration-300 border border-zinc-700/50 hover:border-zinc-500"
                  >
                    <Library className="w-4 h-4 group-hover:-translate-y-0.5 transition-transform" /> Cards
                  </button>
                  
                  <button 
                    onClick={() => setGameState('roster')}
                    className="group flex-1 flex items-center justify-center gap-2 bg-zinc-900/80 backdrop-blur-md text-zinc-300 px-5 py-3.5 rounded-full font-bold text-sm hover:bg-zinc-800 hover:text-white transition-all duration-300 border border-zinc-700/50 hover:border-zinc-500"
                  >
                    <Users className="w-4 h-4 group-hover:-translate-y-0.5 transition-transform" /> Meet AIs
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'roster') {
        return (
          <div className="min-h-screen bg-zinc-100 flex flex-col p-4 sm:p-6 text-zinc-900 font-sans">
            <div className="max-w-6xl w-full mx-auto bg-white rounded-3xl shadow-xl flex flex-col min-h-[90vh] overflow-hidden border border-zinc-200">
              
              <div className="p-6 border-b flex flex-col sm:flex-row justify-between items-center gap-4 bg-zinc-50 shrink-0">
                <h2 className="text-2xl font-black uppercase tracking-tight flex items-center gap-2">
                  <Users className="w-6 h-6" /> The AI Roster ({AI_ROSTER.length})
                </h2>
                <button onClick={() => setGameState('menu')} className="px-4 py-2 bg-zinc-200 rounded-lg font-bold hover:bg-zinc-300">
                  Back to Menu
                </button>
              </div>

              <div className="flex-1 p-6 sm:p-10 bg-zinc-100/50 overflow-y-auto">
                <p className="text-center text-zinc-500 font-medium mb-10 max-w-2xl mx-auto">
                  Every bot has a unique sense of humor. When they play a white card or judge as the Card Czar, their specific personality will heavily influence their choices!
                </p>
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                  {AI_ROSTER.map((bot, idx) => (
                    <div key={idx} className={`flex flex-col p-6 rounded-2xl border-2 ${bot.bg} ${bot.border} shadow-sm relative overflow-hidden group`}>
                      
                      {/* Decorative icon background */}
                      <Bot className={`absolute -bottom-4 -right-4 w-32 h-32 opacity-10 group-hover:scale-110 transition-transform ${bot.text}`} />
                      
                      <div className="flex items-center gap-3 mb-4 z-10">
                        <div className={`p-2 rounded-lg border-2 ${bot.border}`}>
                          <Bot className={`w-6 h-6 ${bot.text}`} />
                        </div>
                        <h3 className={`text-xl font-black ${bot.text}`}>{bot.name}</h3>
                      </div>
                      
                      <div className="z-10 mt-auto">
                        <p className={`text-xs font-bold uppercase tracking-wider mb-2 opacity-80 ${bot.text}`}>Prefers</p>
                        <div className="flex flex-wrap gap-2">
                          {bot.prefs.map(pref => (
                            <span key={pref} className={`text-xs font-bold px-2 py-1 rounded-md border-2 ${bot.border} ${bot.text} capitalize`}>
                              {pref}
                            </span>
                          ))}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'library') {
        const activeList = libTab === 'black' ? allBlackCards : allWhiteCards;
        const filteredList = activeList.filter(c => filterTier === 'all' || c.tier === filterTier);

        const handleAddCard = () => {
          if (!newCardText.trim()) return;
          const newCard = { id: generateId(), text: newCardText, tier: newCardTier, tags: ['custom'] };
          if (libTab === 'black') setAllBlackCards([...allBlackCards, newCard]);
          else setAllWhiteCards([...allWhiteCards, newCard]);
          setNewCardText("");
        };

        const handleDelete = (id) => {
          if (libTab === 'black') setAllBlackCards(allBlackCards.filter(c => c.id !== id));
          else setAllWhiteCards(allWhiteCards.filter(c => c.id !== id));
        };

        return (
          <div className="min-h-screen bg-zinc-100 flex flex-col p-4 sm:p-6 text-zinc-900 font-sans">
            <div className="max-w-4xl w-full mx-auto bg-white rounded-3xl shadow-xl flex flex-col h-[90vh] overflow-hidden border border-zinc-200">
              
              <div className="p-6 border-b flex flex-col sm:flex-row justify-between items-center gap-4 bg-zinc-50 shrink-0">
                <h2 className="text-2xl font-black uppercase tracking-tight flex items-center gap-2">
                  <Library className="w-6 h-6" /> Card Library ({libTab === 'black' ? allBlackCards.length : allWhiteCards.length})
                </h2>
                <button onClick={() => setGameState('menu')} className="px-4 py-2 bg-zinc-200 rounded-lg font-bold hover:bg-zinc-300">
                  Back to Menu
                </button>
              </div>

                <button onClick={() => setLibTab('black')} className={`flex-1 py-4 font-black uppercase tracking-widest ${libTab === 'black' ? 'bg-zinc-950 text-white' : 'hover:bg-zinc-100 text-zinc-500'}`}>Black Cards</button>

                    <div key={p.id} className="flex justify-between opacity-80">
                      <span className="truncate">{p.name}:</span>
                      <span className={p.hasPlayed ? 'text-green-300' : 'text-zinc-500'}>
                        {p.hasPlayed ? 'LOCKED IN' : 'CALCULATING'}
                      </span>
                    </div>
                  ))}
                </div>
              )}

              {(gameState === 'judging' || gameState === 'round_end') && czar && (
                <div className="space-y-2">
                  <div className="font-bold text-white mb-2">» CZAR EVALUATION SCORES:</div>
                  {playedCards.map(p => {
                    const player = players.find(pl => pl.id === p.playerId);
                    const score = evaluateCardMatch(p.card, currentBlackCard, nsfwLevel, czar.prefs);
                    return (
                      <div key={p.playerId} className="flex flex-col mb-2 bg-green-950/30 p-2 rounded border border-green-900/30">
                        <div className="flex justify-between mb-1">
                          <span className="text-white font-bold">{player?.name}</span>
                          <span className="text-yellow-400">{score.toFixed(1)} pts</span>
                        </div>
                        <div className="text-[10px] opacity-70 truncate">
                          Tags: {p.card.tags.join(', ')}
                        </div>
                      </div>
                    );
                  })}
                  {czar.type === 'bot' && gameState === 'judging' && (
                    <div className="mt-2 text-yellow-500 animate-pulse">Bots pick the highest score. A chaos factor (+0-10) is added internally during decision.</div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
