    // this replaces import { Crown, Bot, etc } from 'lucide-react' cleanly for single-file HTML builds
    const LucideIcon = ({ name, className = "", fill = "none" }) => {
      const [svgContent, setSvgContent] = useState("");

      useEffect(() => {
        // Convert camelCase names (like ArrowRight) to kebab-case (arrow-right)
        const kebabName = name
          .replace(/([a-z0-9])([A-Z])/g, '$1-$2')
          .replace(/([A-Z])([A-Z][a-z])/g, '$1-$2')
          .toLowerCase();

        fetch(`https://unpkg.com/lucide-static@latest/icons/${kebabName}.svg`)
          .then(res => res.text())
          .then(svg => {
            // Inject custom classes and fill attributes
            let formattedSvg = svg
              .replace('<svg', `<svg class="${className}"`)
              .replace(/fill="[^"]*"/, `fill="${fill}"`);
            setSvgContent(formattedSvg);
          })
          .catch(() => {
            // Fallback empty circle if loading fails
            setSvgContent(`<svg class="${className}" viewBox="0 0 24 24"></svg>`);
          });
      }, [name, className, fill]);

      return <span dangerouslySetInnerHTML={{ __html: svgContent }} className="inline-flex items-center justify-center" />;

      { id: 'emerald', bg: 'bg-emerald-100', text: 'text-emerald-800', border: 'border-emerald-400' },
      { id: 'purple', bg: 'bg-purple-100', text: 'text-purple-800', border: 'border-purple-400' },
      { id: 'orange', bg: 'bg-orange-100', text: 'text-orange-800', border: 'border-orange-400' }
    ];

    const HUMAN_THEME = { id: 'zinc', bg: 'bg-zinc-100', text: 'text-zinc-800', border: 'border-zinc-400' };

    // --- HELPER FUNCTIONS ---
    const generateId = () => Math.random().toString(36).substr(2, 9);
    const shuffle = (array) => [...array].sort(() => Math.random() - 0.5);

    // --- THE NEW AND IMPROVED AI HUMOR ENGINE 3.1 ---
    const evaluateCardMatch = (whiteCard, blackCard, nsfwLevel) => {
      let score = 0;
      const wTags = whiteCard.tags || [];
      const bTags = blackCard.tags || [];
      const wText = whiteCard.text.toLowerCase();
      const bText = blackCard.text.toLowerCase();

      // 1. VIBE CHECK (Most important for human perception of "humor")
      if (nsfwLevel >= 70 && (wTags.includes('nsfw') || wTags.includes('dark') || wTags.includes('sex'))) {
        score += 15; // High NSFW heavily favors horrible cards
      } else if (nsfwLevel <= 30 && (wTags.includes('nsfw') || wTags.includes('dark') || wTags.includes('sex'))) {
        score -= 30; // Low NSFW heavily penalizes horrible cards
      }

      // 2. DIRECT TAG MATCH (Logical fit)
      wTags.forEach(tag => {
        if (bTags.includes(tag)) score += 5;
      });

      // 3. COMEDIC TROPES (The "Sense of Humor")
      // Trope: Wholesome setup + Horrible punchline = Shock Value
      if ((bTags.includes('family') || bTags.includes('school')) && (wTags.includes('dark') || wTags.includes('nsfw'))) score += 10;
      // Trope: Serious setup + Stupid punchline = Bait & Switch
      if ((bTags.includes('sad') || bTags.includes('scary') || bTags.includes('politics')) && (wTags.includes('absurd') || wTags.includes('animals'))) score += 10;
      // Trope: Gross setup + Food punchline = Disgusting (Funny)
      if ((bTags.includes('gross') || bTags.includes('body')) && wTags.includes('food')) score += 9;

      // 4. KEYWORD SYNERGY (Makes the AI look like it "understands" the sentence)
      if (bText.includes('smell') || bText.includes('sticky')) {
        if (wTags.includes('gross') || wText.includes('fart') || wText.includes('poop')) score += 15;
      }
      if (bText.includes('president') || bText.includes('government') || bText.includes('rule')) {
        if (wTags.includes('politics') || wText.includes('stupid') || wText.includes('debt')) score += 12;
      }
      if (bText.includes('ruined') || bText.includes('worst')) {
        if (wTags.includes('sad') || wTags.includes('dark') || wTags.includes('gross')) score += 10;
      }
      if (bText.includes('secret') || bText.includes('hiding')) {
        if (wTags.includes('secret') || wTags.includes('sex') || wTags.includes('dark')) score += 10;
      }

      // 5. CHAOS FACTOR (Increased to prevent hive-mind if bots have similar cards)
      score += (Math.random() * 12); 

      return score;
    };


    // --- MAIN COMPONENT ---
    function App() {
      const [gameState, setGameState] = useState('menu');
      
      // Settings & DB
      const [aiCount, setAiCount] = useState(4);
      const [nsfwLevel, setNsfwLevel] = useState(50); 
      const [allBlackCards, setAllBlackCards] = useState(INITIAL_BLACK_CARDS);
      const [allWhiteCards, setAllWhiteCards] = useState(INITIAL_WHITE_CARDS);
      const [setupError, setSetupError] = useState("");

      // Game Data
      const [blackDeck, setBlackDeck] = useState([]);
      const [whiteDeck, setWhiteDeck] = useState([]);
      const [players, setPlayers] = useState([]);
      const [czarIndex, setCzarIndex] = useState(0);
      const [blackCardOptions, setBlackCardOptions] = useState([]);
      const [currentBlackCard, setCurrentBlackCard] = useState(null);
      const [playedCards, setPlayedCards] = useState([]);
      const [roundWinner, setRoundWinner] = useState(null);
      const [roundNumber, setRoundNumber] = useState(0);
      const pointsToWin = 5;

      // UI State
      const [showHand, setShowHand] = useState(false);

      const playedCardsRef = useRef([]);

      // --- GAME SETUP & LOGIC ---
      const initGame = () => {
        setSetupError("");
        
        let allowedTiers = ['friendly'];
        if (nsfwLevel > 30) allowedTiers.push('meh');
        if (nsfwLevel > 70) allowedTiers.push('nsfw');

        const validBlack = allBlackCards.filter(c => allowedTiers.includes(c.tier));
        const validWhite = allWhiteCards.filter(c => allowedTiers.includes(c.tier));

        if (validBlack.length === 0 || validWhite.length === 0) {
          setSetupError("You need at least 1 Black Card and 1 White Card in this vibe category to play! Add more in the Library or adjust the slider.");
          return;
        }

        let bDeckPool = [];
        while (bDeckPool.length < 100) {
          const clonedBatch = shuffle(validBlack).map(c => ({...c, id: `${c.id}_${generateId()}`}));
          bDeckPool = [...bDeckPool, ...clonedBatch];
        }
        let bDeck = bDeckPool.slice(0, 100);

        let wDeckPool = [];
        while (wDeckPool.length < 300) {
          const clonedBatch = shuffle(validWhite).map(c => ({...c, id: `${c.id}_${generateId()}`}));
          wDeckPool = [...wDeckPool, ...clonedBatch];
        }
        let wDeck = wDeckPool.slice(0, 300);

        const botNames = ['AI Dave', 'AI Sarah', 'AI Mike', 'AI Chloe', 'AI Chad'];
        const initialPlayers = [
          { id: 'human', name: 'You', type: 'human', theme: HUMAN_THEME, hand: [], score: 0, isCzar: false, hasPlayed: false }
        ];

        for (let i = 0; i < aiCount; i++) {
          initialPlayers.push({ 
            id: `ai${i+1}`, 
            name: botNames[i], 
            type: 'bot', 
            theme: COLOR_THEMES[i % COLOR_THEMES.length], 
            hand: [], score: 0, isCzar: false, hasPlayed: false 
          });
        }

        const startingCzarIdx = Math.floor(Math.random() * initialPlayers.length);
        startRound(initialPlayers, bDeck, startingCzarIdx, wDeck, 1);
      };

      const startRound = (currentPlayers, bDeck, cIndex, wDeck, rNumber) => {
        let currentWhiteIdx = 0;
        
        const newPlayers = currentPlayers.map((p, idx) => {
          const cardsNeeded = 10 - p.hand.length;
          const newCards = wDeck.slice(currentWhiteIdx, currentWhiteIdx + cardsNeeded);
          currentWhiteIdx += cardsNeeded;
          return {
            ...p,
            hand: [...p.hand, ...newCards],
            isCzar: idx === cIndex,
            hasPlayed: false
          };
        });

        const cardsToDraw = Math.min(3, bDeck.length);
        const drawnBlackCards = bDeck.slice(0, cardsToDraw);
        
        setWhiteDeck(wDeck.slice(currentWhiteIdx));
        setBlackDeck(bDeck.slice(cardsToDraw));
        setPlayers(newPlayers);
        setBlackCardOptions(drawnBlackCards);
        setCurrentBlackCard(null);
        setCzarIndex(cIndex);
        setRoundNumber(rNumber);
        setPlayedCards([]);
        playedCardsRef.current = [];
        setRoundWinner(null);
        setGameState('czar_picking');
        setShowHand(false); 
      };

      const handleBlackCardChoice = (selectedCard) => {
        const unselectedCards = blackCardOptions.filter(c => c.id !== selectedCard.id);
        setBlackDeck(prev => [...prev, ...unselectedCards]); 
        setCurrentBlackCard(selectedCard);
        setGameState('playing');
      };

      const handleNextRound = () => {
        if (players.some(p => p.score >= pointsToWin)) {
          setGameState('game_over');
          return;
        }
        const nextCzarIdx = (czarIndex + 1) % players.length;
        startRound(players, blackDeck, nextCzarIdx, whiteDeck, roundNumber + 1);
      };

      const playCard = (playerId, cardObj) => {
        setPlayers(prevPlayers => {
          const player = prevPlayers.find(p => p.id === playerId);
          if (!player || player.hasPlayed) return prevPlayers;

          const newPlayers = prevPlayers.map(p =>
            p.id === playerId ? { ...p, hasPlayed: true, hand: p.hand.filter(c => c.id !== cardObj.id) } : p
          );

          setPlayedCards(prevPlayed => {
            const newPlayed = [...prevPlayed, { playerId, card: cardObj }];
            playedCardsRef.current = newPlayed; 
            
            if (newPlayed.length === prevPlayers.length - 1) {
              setTimeout(() => {
                setPlayedCards(shuffle([...newPlayed])); 
                setGameState('judging');
                setShowHand(false); 
              }, 1500); 
            }
            return newPlayed;
          });
          
          if (playerId === 'human') setShowHand(false);
          return newPlayers;
        });
      };

      const handleJudgeCard = (winningPlay) => {
        setRoundWinner(winningPlay.playerId);
        setPlayers(prev => prev.map(p =>
          p.id === winningPlay.playerId ? { ...p, score: p.score + 1 } : p
        ));
        setGameState('round_end');
      };

      // --- AUTOMATIC ROUND ADVANCEMENT ---
      useEffect(() => {
        if (gameState === 'round_end') {
          const timer = setTimeout(() => {
            handleNextRound();
          }, 5000); 
          return () => clearTimeout(timer);
        }
      }, [gameState]);

      // --- AI LOGIC: CZAR PICKING BLACK CARD ---
      useEffect(() => {
        if (gameState === 'czar_picking') {
          const czar = players.find(p => p.isCzar);
          if (czar && czar.type === 'bot' && blackCardOptions.length > 0) {
            const timeout = setTimeout(() => {
              const randomIdx = Math.floor(Math.random() * blackCardOptions.length);
              handleBlackCardChoice(blackCardOptions[randomIdx]);
            }, 2000 + Math.random() * 1000);
            return () => clearTimeout(timeout);
          }
        }
      }, [gameState, blackCardOptions]);

      // --- AI LOGIC: PLAYING WHITE CARDS ---
      useEffect(() => {
        if (gameState === 'playing') {
          const timeouts = [];
          players.forEach(p => {
            if (p.type === 'bot' && !p.isCzar && !p.hasPlayed) {
              const delay = 1500 + Math.random() * 3000; 
              const timeout = setTimeout(() => {
                setPlayers(currentPlayers => {
                  const bot = currentPlayers.find(b => b.id === p.id);
                  if (bot && !bot.hasPlayed && currentBlackCard) {
                    let bestCard = bot.hand[0];
                    let bestScore = -999;
                    
                    bot.hand.forEach(card => {
                      const score = evaluateCardMatch(card, currentBlackCard, nsfwLevel);
                      if (score > bestScore) {
                        bestScore = score;
                        bestCard = card;
                      }
                    });
                    
                    playCard(bot.id, bestCard);
                  }
                  return currentPlayers; 
                });
              }, delay);
              timeouts.push(timeout);
            }
          });
          return () => timeouts.forEach(clearTimeout);
        }
      }, [gameState, roundNumber, currentBlackCard, nsfwLevel]); 

      // --- AI LOGIC: JUDGING ---
      useEffect(() => {
        if (gameState === 'judging') {
          const czar = players.find(p => p.isCzar);
          if (czar && czar.type === 'bot') {
            const delay = 3500 + Math.random() * 3000; 
            const timeout = setTimeout(() => {
              const currentPlayed = playedCardsRef.current;
              if (currentPlayed.length > 0 && currentBlackCard) {
                let bestPlay = currentPlayed[0];
                let bestScore = -999;
                currentPlayed.forEach(play => {
                   const score = evaluateCardMatch(play.card, currentBlackCard, nsfwLevel);
                   if (score > bestScore) {
                     bestScore = score;
                     bestPlay = play;
                   }
                });
                handleJudgeCard(bestPlay);
              }
            }, delay);
            return () => clearTimeout(timeout);
          }
        }
      }, [gameState, currentBlackCard, nsfwLevel]);

      // --- RENDER HELPERS ---
      const human = players.find(p => p.id === 'human');
      const czar = players.find(p => p.isCzar);
      
      const getStatusMessage = () => {
        if (gameState === 'czar_picking') {
          if (human?.isCzar) return "Choose the Black Card!";
          return `${czar?.name} is picking a Black Card...`;
        }
        if (gameState === 'playing') {
          if (human?.isCzar) return "You are the Card Czar! Waiting for players...";
          if (!human?.hasPlayed) return "Choose a card to play.";
          return "Waiting for others to play...";
        }
        if (gameState === 'judging') {
          if (human?.isCzar) return "You are the Card Czar! Pick the winning card.";
          return `${czar?.name} is judging...`;
        }
        if (gameState === 'round_end') {
          const winnerName = players.find(p => p.id === roundWinner)?.name;
          return `${winnerName} wins the round!`;
        }
        return "";
      };

      const Card = ({ text, isBlack, onClick, className = "", hover = false }) => (
        <div 
          onClick={onClick}
          className={`
            relative flex flex-col justify-between p-4 sm:p-5 rounded-xl shadow-lg 
            w-36 sm:w-48 h-48 sm:h-64 flex-shrink-0 cursor-pointer 
            transition-all duration-300 ease-out border-2
            ${isBlack ? 'bg-zinc-950 text-white border-zinc-700' : 'bg-white text-zinc-900 border-zinc-200'}
            ${hover ? 'hover:-translate-y-4 hover:shadow-xl hover:border-zinc-400' : ''}
            ${className}
          `}
        >
          <div className="font-bold text-base sm:text-xl leading-tight overflow-hidden">
            {text}
          </div>
          <div className="flex items-center gap-1.5 sm:gap-2 mt-4 opacity-50 text-[10px] sm:text-sm font-bold uppercase tracking-wider shrink-0">
            <div className="w-2 h-2 sm:w-3 sm:h-3 rounded-full border-2 border-current"></div>
            Cards vs AI
          </div>
        </div>
      );

      // --- VIEWS ---

      if (gameState === 'menu') {
        return (
          <div className="min-h-screen bg-[#0a0a0a] flex flex-col items-center justify-center p-6 text-white font-sans relative overflow-hidden">
            
            <div className="absolute top-10 left-4 md:left-10 w-48 md:w-64 h-64 md:h-80 bg-zinc-900 rounded-3xl rotate-12 shadow-2xl opacity-40 -z-10"></div>
            <div className="absolute bottom-10 right-4 md:right-10 w-48 md:w-64 h-64 md:h-80 bg-zinc-900 rounded-3xl -rotate-12 shadow-2xl opacity-40 -z-10"></div>
            
            <div className="flex flex-col items-center z-10 space-y-12 max-w-3xl w-full mt-[-5vh]">
              
              <div className="flex flex-col items-center gap-6 md:gap-8 select-none">
                <div className="bg-white text-black font-black text-6xl md:text-[5.5rem] leading-none px-8 py-5 rounded-xl -rotate-[4deg] -ml-6 shadow-lg tracking-tight">
                  CARDS
                </div>
                <div className="bg-white text-black font-black text-6xl md:text-[5.5rem] leading-none px-8 py-5 rounded-xl rotate-[2deg] ml-12 shadow-lg tracking-tight z-10">
                  AGAINST
                </div>
                <div className="bg-zinc-900 border border-zinc-700 text-white font-black text-6xl md:text-[5.5rem] leading-none px-8 py-5 rounded-xl flex items-center gap-4 shadow-[0_0_30px_rgba(59,130,246,0.15)] mt-1 -rotate-[1deg]">
                  AI <LucideIcon name="Bot" className="w-14 h-14 md:w-20 md:h-20 text-blue-400 drop-shadow-[0_0_15px_rgba(59,130,246,0.8)]" />
                </div>
              </div>

              <p className="text-zinc-400 text-lg md:text-xl text-center max-w-md font-medium px-4">
                A terrible party game for you and your completely soulless robotic friends.
              </p>

              <div className="flex flex-col gap-4 w-full max-w-[280px] sm:max-w-xs mx-auto">
                <button 
                  onClick={() => setGameState('setup')}
                  className="group flex items-center justify-center gap-3 bg-white text-black px-8 py-4 md:py-5 rounded-full font-bold text-lg md:text-xl hover:bg-zinc-200 hover:-translate-y-1 transition-all shadow-[0_0_40px_rgba(255,255,255,0.15)] hover:shadow-[0_0_60px_rgba(255,255,255,0.25)]"
                >
                  <LucideIcon name="Sparkles" className="w-5 h-5 md:w-6 md:h-6 text-zinc-700 group-hover:text-black transition-colors" />
                  Enter the Madness <LucideIcon name="ArrowRight" className="w-5 h-5 md:w-6 md:h-6 group-hover:translate-x-1 transition-transform" />
                </button>
                
                <button 
                  onClick={() => setGameState('library')}
                  className="flex items-center justify-center gap-3 bg-transparent text-zinc-400 px-8 py-3 rounded-full font-bold text-sm md:text-base hover:text-white transition-colors"
                >
                  <LucideIcon name="Library" className="w-4 h-4 md:w-5 md:h-5" /> View & Manage Cards
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'library') {
        const [libTab, setLibTab] = useState('black'); 
        const [filterTier, setFilterTier] = useState('all');
        const [newCardText, setNewCardText] = useState("");
        const [newCardTier, setNewCardTier] = useState("friendly");

        const activeList = libTab === 'black' ? allBlackCards : allWhiteCards;
        const filteredList = activeList.filter(c => filterTier === 'all' || c.tier === filterTier);

        const handleAddCard = () => {
          if (!newCardText.trim()) return;
          const newCard = { id: generateId(), text: newCardText, tier: newCardTier, tags: ['custom'] };
          if (libTab === 'black') setAllBlackCards([...allBlackCards, newCard]);
          else setAllWhiteCards([...allWhiteCards, newCard]);
          setNewCardText("");
        };

        const handleDelete = (id) => {
          if (libTab === 'black') setAllBlackCards(allBlackCards.filter(c => c.id !== id));
          else setAllWhiteCards(allWhiteCards.filter(c => c.id !== id));
        };

        return (
          <div className="min-h-screen bg-zinc-100 flex flex-col p-4 sm:p-6 text-zinc-900 font-sans">
            <div className="max-w-4xl w-full mx-auto bg-white rounded-3xl shadow-xl flex flex-col h-[90vh] overflow-hidden border border-zinc-200">
              
              <div className="p-6 border-b flex flex-col sm:flex-row justify-between items-center gap-4 bg-zinc-50 shrink-0">
                <h2 className="text-2xl font-black uppercase tracking-tight flex items-center gap-2">
                  <LucideIcon name="Library" className="w-6 h-6" /> Card Library ({libTab === 'black' ? allBlackCards.length : allWhiteCards.length})
                </h2>
                <button onClick={() => setGameState('menu')} className="px-4 py-2 bg-zinc-200 rounded-lg font-bold hover:bg-zinc-300">
                  Back to Menu
                </button>
              </div>

              <div className="flex border-b bg-white shrink-0">
                <button onClick={() => setLibTab('black')} className={`flex-1 py-4 font-black uppercase tracking-widest ${libTab === 'black' ? 'bg-zinc-950 text-white' : 'hover:bg-zinc-100 text-zinc-500'}`}>Black Cards</button>
                <button onClick={() => setLibTab('white')} className={`flex-1 py-4 font-black uppercase tracking-widest ${libTab === 'white' ? 'bg-zinc-200 text-zinc-900' : 'hover:bg-zinc-100 text-zinc-500'}`}>White Cards</button>
              </div>

              <div className="p-4 bg-zinc-50 border-b flex justify-center gap-2 shrink-0">
                {['all', 'friendly', 'meh', 'nsfw'].map(t => (
                  <button 
                    key={t} onClick={() => setFilterTier(t)} 
                    className={`px-4 py-1.5 rounded-full text-sm font-bold uppercase transition-colors ${filterTier === t ? 'bg-zinc-900 text-white' : 'bg-zinc-200 text-zinc-600 hover:bg-zinc-300'}`}
                  >
                    {t}
                  </button>
                ))}
              </div>

              <div className="flex-1 overflow-y-auto p-6 bg-zinc-100/50">
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {filteredList.map(card => (
                    <div key={card.id} className={`p-4 rounded-xl shadow-sm border relative group ${libTab === 'black' ? 'bg-zinc-900 text-white' : 'bg-white text-zinc-900'}`}>
                      <button onClick={() => handleDelete(card.id)} className="absolute top-2 right-2 text-red-500 opacity-0 group-hover:opacity-100 transition-opacity bg-white/80 p-1 rounded hover:bg-red-500 hover:text-white">
                        <LucideIcon name="Trash2" className="w-4 h-4" />
                      </button>
                      <div className="font-bold mb-4 pr-6">{card.text}</div>
                      <div className="flex gap-2">
                        <span className="text-[10px] font-black uppercase px-2 py-0.5 rounded bg-zinc-500/20">{card.tier}</span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="p-6 bg-white border-t shrink-0">
                <div className="flex flex-col sm:flex-row gap-4 items-center">
                  <input 
                    type="text" 
                    value={newCardText} onChange={e => setNewCardText(e.target.value)}
                    placeholder={libTab === 'black' ? "Write your own Black Card..." : "Write your own White Card..."}
                    className="flex-1 w-full border-2 border-zinc-200 rounded-xl px-4 py-3 font-medium outline-none focus:border-zinc-900"
                    onKeyDown={e => e.key === 'Enter' && handleAddCard()}
                  />
                  <select value={newCardTier} onChange={e => setNewCardTier(e.target.value)} className="w-full sm:w-auto border-2 border-zinc-200 rounded-xl px-4 py-3 font-bold outline-none cursor-pointer bg-white">
                    <option value="friendly">Friendly</option>
                    <option value="meh">Meh</option>
                    <option value="nsfw">NSFW</option>
                  </select>
                  <button onClick={handleAddCard} className="w-full sm:w-auto bg-zinc-900 text-white px-6 py-3 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-zinc-800">
                    <LucideIcon name="Plus" className="w-5 h-5"/> Add
                  </button>
                </div>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'setup') {
        const currentHue = Math.max(0, 120 - (nsfwLevel * 1.2));
        
        return (
          <div className="min-h-screen bg-zinc-100 flex flex-col items-center justify-center p-4 sm:p-6 text-zinc-900 font-sans">
            <div className="max-w-xl w-full bg-white p-6 sm:p-10 rounded-3xl shadow-2xl space-y-10 border border-zinc-200">
              <div className="flex items-center justify-between border-b pb-6">
                <div className="flex items-center gap-3">
                  <LucideIcon name="Settings" className="w-8 h-8 text-zinc-800" />
                  <h2 className="text-3xl font-black uppercase tracking-tight">Game Setup</h2>
                </div>
                <button onClick={() => setGameState('menu')} className="text-sm font-bold text-zinc-500 hover:text-zinc-800">Back</button>
              </div>
              
              <div className="space-y-8">
                <div className="space-y-4">
                  <div className="flex justify-between items-end">
                    <label className="font-bold text-xl flex items-center gap-2">
                      <LucideIcon name="Bot" className="w-6 h-6" /> Opponents
                    </label>
                    <span className="text-2xl font-black text-zinc-400">{aiCount} Bots</span>
                  </div>
                  <input 
                    type="range" min="1" max="5" step="1" value={aiCount} 
                    onChange={(e) => setAiCount(parseInt(e.target.value))}
                    className="w-full h-3 bg-zinc-200 rounded-lg appearance-none cursor-pointer accent-zinc-900"
                  />
                  <div className="flex justify-between text-sm text-zinc-500 font-semibold px-1">
                    <span>1</span><span>5</span>
                  </div>
                </div>
                
                <div className="pt-6 border-t space-y-4">
                  <div className="flex justify-between items-end">
                    <label className="font-bold text-xl flex items-center gap-2">
                      <LucideIcon name="Flame" className="w-6 h-6" /> Deck Vibe
                    </label>
                  </div>
                  
                  <div 
                    className="p-4 rounded-xl border-2 text-center transition-colors duration-150"
                    style={{ 
                      backgroundColor: `hsl(${currentHue}, 80%, 90%)`, 
                      borderColor: `hsl(${currentHue}, 80%, 80%)`,
                      color: `hsl(${currentHue}, 80%, 25%)` 
                    }}
                  >
                    <span className="font-black text-lg">{nsfwLevel}% Terrible People</span>
                    <p className="text-sm opacity-80 font-medium mt-1">
                      {nsfwLevel === 0 ? "100% Squeaky Clean Family Edition" : 
                       nsfwLevel === 100 ? "100% Depraved & Uncensored" : 
                       `A mix of clean and dirty cards based on the slider.`}
                    </p>
                  </div>
                  
                  <input 
                    type="range" min="0" max="100" step="1" value={nsfwLevel} 
                    onChange={(e) => setNsfwLevel(parseInt(e.target.value))}
                    className="w-full h-3 rounded-lg appearance-none cursor-pointer transition-colors duration-150"
                    style={{
                      background: `linear-gradient(to right, hsl(120, 70%, 50%), hsl(0, 70%, 50%))`
                    }}
                  />
                  <style dangerouslySetInnerHTML={{__html: `
                    input[type=range]::-webkit-slider-thumb {
                      -webkit-appearance: none;
                      height: 24px; width: 24px; border-radius: 50%; border: 3px solid white; box-shadow: 0 2px 6px rgba(0,0,0,0.3);
                      background: hsl(${currentHue}, 80%, 45%);
                      transition: background 0.1s ease;
                    }
                  `}} />
                  
                  <div className="flex justify-between text-sm text-zinc-500 font-semibold px-1">
                    <span className="flex items-center gap-1"><LucideIcon name="Smile" className="w-4 h-4"/> Friendly</span>
                    <span className="flex items-center gap-1">NSFW <LucideIcon name="Flame" className="w-4 h-4"/></span>
                  </div>
                </div>
              </div>
              
              <div className="pt-6 border-t flex flex-col gap-4">
                {setupError && (
                  <div className="bg-red-100 text-red-700 p-3 rounded-lg text-sm font-bold text-center border border-red-200">
                    {setupError}
                  </div>
                )}
                <button 
                  onClick={initGame}
                  className="w-full flex justify-center items-center gap-2 bg-zinc-950 text-white px-8 py-4 rounded-xl font-bold text-lg hover:bg-zinc-800 transition-colors shadow-lg"
                >
                  Deal the Cards
                </button>
              </div>
            </div>
          </div>
        );
      }

      if (gameState === 'game_over') {
        const winner = players.reduce((prev, current) => (prev.score > current.score) ? prev : current);
        return (
          <div className="min-h-screen bg-zinc-100 flex flex-col items-center justify-center p-6 text-zinc-900 font-sans">
            <div className="max-w-2xl w-full bg-white p-12 rounded-3xl shadow-2xl text-center space-y-8 border border-zinc-200">
              <LucideIcon name="Trophy" className="w-24 h-24 mx-auto text-yellow-400 mb-6" />
              <h1 className="text-5xl font-black uppercase tracking-tighter">Game Over!</h1>
              <p className="text-2xl font-bold">
                {winner.id === 'human' ? 'You won!' : `${winner.name} won!`}
              </p>
              <div className="space-y-4 my-8">
                {players.sort((a,b) => b.score - a.score).map((p, i) => (
                  <div key={p.id} className={`flex justify-between items-center text-lg font-medium px-8 py-3 rounded-xl border ${p.theme.bg} ${p.theme.border} ${p.theme.text}`}>
                    <span className="flex items-center gap-2">
                      <span className="opacity-50 font-black w-6">{i+1}.</span> 
                      {p.name}
                    </span>
                    <span className="font-black bg-white/50 px-3 py-1 rounded-md">{p.score} pts</span>
                  </div>
                ))}
              </div>
              <button 
                onClick={() => setGameState('menu')}
                className="bg-zinc-950 text-white px-8 py-4 rounded-full font-bold text-lg hover:bg-zinc-800 transition-colors shadow-lg"
              >
                Back to Menu
              </button>
            </div>
          </div>
        );
      }

      // --- CORE GAME VIEWS ---
      return (
        <div className="min-h-screen bg-zinc-200 font-sans flex flex-col overflow-hidden text-zinc-900 relative">
          <style dangerouslySetInnerHTML={{__html: `
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
          `}} />
          
          {/* Top Header / Scoreboard */}
          <header className="bg-white border-b border-zinc-300 shadow-sm p-3 sm:p-4 sticky top-0 z-20 flex flex-col sm:flex-row items-center justify-between gap-3 sm:gap-4">
            <div className="font-black text-xl tracking-tighter uppercase shrink-0 flex items-center gap-4">
              Cards vs AI
              <div className="text-xs font-bold text-zinc-400 tracking-normal hidden md:block">
                Round {roundNumber}
              </div>
            </div>
            
            <div className="flex flex-wrap justify-center gap-2 sm:gap-3 w-full sm:w-auto flex-1 md:justify-center">
              {players.map(p => (
                <div key={p.id} className={`
                  flex items-center gap-1.5 sm:gap-2 px-2.5 sm:px-3 py-1.5 rounded-full text-xs sm:text-sm font-bold border-2 transition-all
                  ${p.isCzar ? 'shadow-[0_0_15px_rgba(251,191,36,0.5)] border-amber-400' : p.theme.border}
                  ${p.theme.bg} ${p.theme.text}
                  ${p.id === 'human' ? 'ring-2 ring-offset-1 ring-zinc-900' : ''}
                `}>
                  {p.isCzar ? <LucideIcon name="Crown" className="w-3.5 h-3.5 sm:w-4 sm:h-4 text-amber-500" fill="currentColor" /> : 
                   p.type === 'human' ? <LucideIcon name="User" className="w-3.5 h-3.5 sm:w-4 sm:h-4" /> : <LucideIcon name="Bot" className="w-3.5 h-3.5 sm:w-4 sm:h-4" />}
                  <span className="hidden sm:inline">{p.name}</span>
                  <span className="bg-white/60 px-1.5 rounded-md ml-0.5 sm:ml-1">{p.score}</span>
                </div>
              ))}
            </div>

            <button 
              onClick={() => setGameState('game_over')}
              className="absolute right-3 top-3 md:relative md:right-0 md:top-0 p-1.5 hover:bg-red-100 text-red-500 rounded-full transition-colors group"
              title="End Match"
            >
              <LucideIcon name="XCircle" className="w-6 h-6 group-hover:scale-110 transition-transform" />
            </button>
          </header>

          {/* Main Play Area */}
          <main className={`flex-1 flex flex-col lg:flex-row items-center justify-start lg:justify-center p-4 sm:p-6 gap-6 sm:gap-8 lg:gap-12 overflow-y-auto pb-48`}>
            
            {/* CZAR PICKING PHASE */}
            {gameState === 'czar_picking' && (
              <div className="w-full flex flex-col items-center gap-6 mt-4 lg:mt-0">
                <h2 className="text-xl sm:text-3xl font-black text-zinc-800 text-center animate-pulse">{getStatusMessage()}</h2>
                
                {human?.isCzar ? (
                  <div className="flex flex-row overflow-x-auto pb-4 gap-4 w-full justify-start md:justify-center px-4 snap-x hide-scrollbar">
                    {blackCardOptions.map((card, idx) => (
                      <div key={idx} className="snap-center shrink-0">
                        <Card text={card.text} isBlack hover onClick={() => handleBlackCardChoice(card)} />
                      </div>
                    ))}
                  </div>
                ) : (
                  <div className="flex flex-wrap justify-center gap-4 opacity-50 pointer-events-none">
                    {[1, 2, 3].map(i => (
                      <Card key={i} text="?" isBlack className="animate-pulse" />
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* PLAYING / JUDGING PHASE */}
            {gameState !== 'czar_picking' && (
              <>
                <div className="flex flex-col items-center space-y-4 sm:space-y-6 w-full lg:w-1/3 max-w-sm shrink-0 mt-2 lg:mt-0">
                  {currentBlackCard && <Card text={currentBlackCard.text} isBlack />}
                  
                  <div className="text-center space-y-3 w-full">
                    <h2 className="text-lg sm:text-2xl font-black text-zinc-800 min-h-[40px] flex items-center justify-center">
                      {getStatusMessage()}
                      {gameState === 'judging' && czar?.type === 'bot' && <LucideIcon name="Loader2" className="w-5 h-5 ml-2 animate-spin text-zinc-500" />}
                    </h2>
                    
                    {gameState === 'playing' && (
                      <div className="flex flex-wrap justify-center gap-2 mt-4 max-w-xs mx-auto">
                        {players.filter(p => !p.isCzar).map(p => (
                          <div key={p.id} className={`
                            flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold transition-all border
                            ${p.hasPlayed ? `${p.theme.bg} ${p.theme.text} ${p.theme.border} scale-100 shadow-sm` : 'bg-zinc-200/50 text-zinc-400 border-transparent scale-95'}
                          `}>
                            {p.hasPlayed && <LucideIcon name="CheckCircle2" className="w-3 h-3" />}
                            {p.name} {p.hasPlayed ? 'played' : 'thinking...'}
                          </div>
                        ))}
                      </div>
                    )}
                    
                    {gameState === 'round_end' && (
                       <div className="mt-4 flex flex-col items-center justify-center gap-3">
                         <div className="text-zinc-500 font-bold animate-pulse flex items-center gap-2">
                           Loading next round... <LucideIcon name="Loader2" className="w-4 h-4 animate-spin" />
                         </div>
                         <button 
                           onClick={handleNextRound}
                           className="bg-zinc-900 text-white px-6 py-2 rounded-full font-bold text-sm hover:bg-zinc-800 transition-colors shadow-lg flex items-center gap-2"
                         >
                           Next Round <LucideIcon name="ArrowRight" className="w-4 h-4" />
                         </button>
                       </div>
                    )}
                  </div>
                </div>

                {/* Judging Area */}
                {(gameState === 'judging' || gameState === 'round_end') && (
                  <div className="w-full lg:w-2/3 max-w-4xl flex justify-center pb-8 lg:pb-0">
                    <div className="flex flex-row flex-wrap justify-center gap-4 sm:gap-6 p-4 sm:p-8 rounded-3xl bg-zinc-300/30 w-full items-center min-h-[300px]">
                      {playedCards.map((play, idx) => {
                        const isWinner = gameState === 'round_end' && roundWinner === play.playerId;
                        const canJudge = gameState === 'judging' && human?.isCzar;
                        const playerTheme = players.find(p => p.id === play.playerId)?.theme;
                        const playerName = players.find(p => p.id === play.playerId)?.name;
                        
                        return (
                          <div key={idx} className="relative mt-4 sm:mt-6">
                            {(gameState === 'round_end' || (gameState === 'judging' && human?.isCzar)) && (
                               <div className={`absolute -top-5 sm:-top-8 left-1/2 -translate-x-1/2 whitespace-nowrap px-3 sm:px-4 py-1 sm:py-1.5 rounded-full text-xs sm:text-sm font-bold shadow-md z-20 transition-all
                                 ${isWinner ? `${playerTheme?.bg} ${playerTheme?.text} ring-2 ${playerTheme?.border} scale-110` : 
                                   (gameState === 'judging' ? `${playerTheme?.bg} ${playerTheme?.text} border ${playerTheme?.border}` : 'bg-zinc-800 text-white')}
                               `}>
                                 {playerName} {isWinner ? 'WINS!' : ''}
                               </div>
                            )}
                            
                            <Card 
                              text={play.card.text} 
                              hover={canJudge}
                              onClick={() => canJudge ? handleJudgeCard(play) : null}
                              className={`
                                ${isWinner ? `ring-4 ${playerTheme?.border} scale-105 shadow-2xl z-10` : ''}
                                ${(gameState === 'judging' && human?.isCzar) ? `ring-2 ${playerTheme?.border}` : ''}
                                ${gameState === 'round_end' && !isWinner ? 'opacity-40 scale-95 grayscale' : ''}
                                ${canJudge ? 'hover:ring-4 hover:ring-blue-400' : ''}
                              `}
                            />
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </>
            )}
          </main>

          {/* Slide-Up Hand Area (Bottom Sheet) */}
          {gameState === 'playing' && !human?.isCzar && (
            <div className={`
              fixed bottom-0 left-0 w-full z-30 transition-transform duration-500 ease-in-out
              ${showHand ? 'translate-y-0' : 'translate-y-[calc(100%-48px)] sm:translate-y-[calc(100%-64px)]'}
            `}>
              <div className="bg-zinc-800 rounded-t-3xl shadow-[0_-10px_40px_rgba(0,0,0,0.3)] border-t border-zinc-700">
                <div 
                  onClick={() => setShowHand(!showHand)}
                  className="h-12 sm:h-16 flex items-center justify-center cursor-pointer hover:bg-zinc-700/50 transition-colors rounded-t-3xl border-b border-zinc-700/50"
                >
                  <div className="flex flex-col items-center gap-1">
                    <div className="w-12 h-1.5 bg-zinc-600 rounded-full"></div>
                    <h3 className="text-zinc-300 font-bold uppercase tracking-widest text-xs sm:text-sm flex items-center gap-2">
                      {human?.hasPlayed ? (
                        <span className="text-emerald-400 flex items-center gap-1"><LucideIcon name="CheckCircle2" className="w-4 h-4"/> Card Played</span>
                      ) : (
                        <span>Your Hand ({human?.hand.length})</span>
                      )}
                    </h3>
                  </div>
                </div>
                
                <div className="p-4 sm:p-6 pb-8 max-w-7xl mx-auto h-[280px] sm:h-[320px]">
                  <div className="flex overflow-x-auto h-full gap-3 sm:gap-4 px-2 snap-x hide-scrollbar items-center">
                    {human?.hand.map((cardObj, idx) => (
                      <div key={idx} className={`snap-start shrink-0 transition-all duration-300 ${human.hasPlayed ? 'opacity-50 grayscale pointer-events-none scale-95' : ''}`}>
                        <Card 
                          text={cardObj.text} 
                          hover={!human?.hasPlayed}
                          onClick={() => {
                            if (gameState === 'playing' && !human?.isCzar && !human?.hasPlayed) {
                              playCard('human', cardObj);
                            }
                          }}
                        />
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
